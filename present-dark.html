<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>My Library — Presentation</title><style>*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }body { font-family:'Optima',Candara,'Gill Sans','Segoe UI',sans-serif; overflow:hidden; height:100vh; width:100vw; }.deck { position:relative; width:100vw; height:100vh; }.slide { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center;  padding:6vh 8vw; opacity:0; pointer-events:none; transition:opacity 0.45s ease; }.slide.active { opacity:1; pointer-events:auto; }.ey { display:flex; flex-direction:column; font-size:0.62rem; letter-spacing:0.22em;  text-transform:uppercase; margin-bottom:2rem; }.rule { display:block; width:2.4rem; height:1px; margin-bottom:0.55rem; }.s-head { font-family:'Palatino Linotype',Palatino,'Book Antiqua',serif;  font-size:clamp(1.4rem,3.5vw,2.6rem); font-weight:400; margin-bottom:2rem;  text-wrap:balance; max-width:32ch; line-height:1.15; }.cover-big { font-family:'Palatino Linotype',Palatino,'Book Antiqua',serif;  font-size:clamp(6rem,18vw,16rem); font-weight:400; line-height:0.85; letter-spacing:-0.02em;  animation:riseIn 0.9s cubic-bezier(0.16,1,0.3,1) both; }.cover-unit { font-size:clamp(0.7rem,1.4vw,0.9rem); letter-spacing:0.18em; text-transform:uppercase;  margin-top:0.5rem; animation:riseIn 0.9s 0.1s cubic-bezier(0.16,1,0.3,1) both; }.cover-rule { width:3rem; height:1px; margin:2rem auto;  animation:riseIn 0.9s 0.18s cubic-bezier(0.16,1,0.3,1) both; }.cover-title { font-family:'Palatino Linotype',Palatino,'Book Antiqua',serif;  font-size:clamp(1.4rem,3.5vw,2.8rem); font-weight:400;  animation:riseIn 0.9s 0.24s cubic-bezier(0.16,1,0.3,1) both; }.cover-sub { font-size:clamp(0.65rem,1.3vw,0.85rem); letter-spacing:0.14em; text-transform:uppercase;  margin-top:0.75rem; animation:riseIn 0.9s 0.32s cubic-bezier(0.16,1,0.3,1) both; }@keyframes riseIn { from{opacity:0;transform:translateY(1.5rem)} to{opacity:1;transform:translateY(0)} }.stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1.5vw; max-width:860px; }.stat-card { border:1px solid; border-radius:2px; padding:1.4rem 1.2rem; }.stat-num { font-family:'Palatino Linotype',Palatino,'Book Antiqua',serif;  font-size:clamp(2.2rem,5vw,4rem); font-weight:400; line-height:1; margin-bottom:0.5rem;  font-variant-numeric:tabular-nums; }.stat-label { font-size:clamp(0.6rem,1.1vw,0.75rem); letter-spacing:0.14em; text-transform:uppercase; }.list-col { display:flex; flex-direction:column; max-width:640px; }.list-row { border-top:1px solid; padding:0.65rem 0; }.list-title { font-family:'Palatino Linotype',Palatino,'Book Antiqua',serif;  font-size:clamp(0.85rem,1.8vw,1.2rem); font-weight:400; }.list-sub { font-size:clamp(0.65rem,1.2vw,0.8rem); letter-spacing:0.05em; margin-top:0.15rem; }.list-label { font-size:0.62rem; letter-spacing:0.18em; text-transform:uppercase; margin-bottom:0.75rem; }.bar-list { display:flex; flex-direction:column; gap:0.65rem; max-width:680px; width:100%; }.bar-row { display:grid; grid-template-columns:10rem 1fr 2.5rem; gap:1rem; align-items:center; }.bar-label { font-size:clamp(0.68rem,1.2vw,0.82rem); text-align:right; line-height:1.3; }.bar-wrap { height:6px; background:rgba(128,128,128,0.12); border-radius:1px; overflow:hidden; }.bar-fill { height:100%; border-radius:1px; }.bar-count { font-size:0.7rem; font-variant-numeric:tabular-nums; }.counter { position:fixed; top:1.4rem; right:2rem; font-size:0.68rem; letter-spacing:0.14em;  z-index:200; font-variant-numeric:tabular-nums; padding:0.28rem 0.6rem; border-radius:0.2rem;  background:rgba(0,0,0,0.35); color:rgba(255,255,255,0.6); }.dots { position:fixed; bottom:1.6rem; left:50%; transform:translateX(-50%);  display:flex; gap:0.45rem; z-index:200;  background:rgba(0,0,0,0.35); padding:0.45rem 0.8rem; border-radius:2rem; }.dot { width:5px; height:5px; border-radius:50%; cursor:pointer;  transition:background 0.3s,transform 0.25s; border:none; }.dot.active { transform:scale(1.45); }.btn-p,.btn-n { position:fixed; top:50%; transform:translateY(-50%);  background:rgba(0,0,0,0.3); border:none; cursor:pointer; padding:0.9rem 0.6rem;  color:rgba(255,255,255,0.4); z-index:200; transition:color 0.2s,background 0.2s; border-radius:2px; }.btn-p:hover,.btn-n:hover { color:rgba(255,255,255,0.85); background:rgba(0,0,0,0.55); }.btn-p { left:0.6rem; } .btn-n { right:0.6rem; }</style></head><body><span class='counter' id='ct'>1 / 3</span><div class='deck'><div class="slide active" style="background:#0f172a;align-items:center;text-align:center;"><div class="cover-big" style="color:#cbd5e1">16</div><div class="cover-unit" style="color:rgba(203,213,225,0.5)">books in my library</div><div class="cover-rule" style="background:rgba(226,185,111,0.25)"></div><div class="cover-title" style="color:#f1f5f9">My Library</div><div class="cover-sub" style="color:rgba(203,213,225,0.5)">Memoir  ·  UK  ·  2026</div></div><div class="slide" style="background:#1e293b"><div class="ey" style="color:#e2b96f"><span class="rule" style="background:rgba(226,185,111,0.2)"></span>By the Numbers</div><p class="s-head" style="color:#f1f5f9">What the shelf looks like.</p><div class="stat-grid"><div class="stat-card" style="border-color:rgba(226,185,111,0.2)"><div class="stat-num" style="color:#e2b96f">16</div><div class="stat-label" style="color:rgba(203,213,225,0.5)">Books</div></div><div class="stat-card" style="border-color:rgba(226,185,111,0.2)"><div class="stat-num" style="color:#e2b96f">4</div><div class="stat-label" style="color:rgba(203,213,225,0.5)">Countries</div></div><div class="stat-card" style="border-color:rgba(226,185,111,0.2)"><div class="stat-num" style="color:#e2b96f">62%</div><div class="stat-label" style="color:rgba(203,213,225,0.5)">Female Authors</div></div><div class="stat-card" style="border-color:rgba(226,185,111,0.2)"><div class="stat-num" style="color:#e2b96f">8</div><div class="stat-label" style="color:rgba(203,213,225,0.5)">Categories</div></div></div></div><div class="slide" style="background:#0f172a"><div class="ey" style="color:#cbd5e1"><span class="rule" style="background:rgba(226,185,111,0.25)"></span>Reading Now</div><p class="s-head" style="color:#f1f5f9">1 book in progress.</p><div class="list-col"><div class="list-row" style="border-color:rgba(226,185,111,0.25)"><div class="list-title" style="color:#f1f5f9">Being You: A New Science of Consciousness</div><div class="list-sub" style="color:rgba(203,213,225,0.5)">Anil Seth</div></div></div></div></div><div class='dots' id='de'></div><button class='btn-p' id='bp' aria-label='Previous'><svg width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round'><polyline points='15 18 9 12 15 6'/></svg></button><button class='btn-n' id='bn' aria-label='Next'><svg width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round'><polyline points='9 18 15 12 9 6'/></svg></button><script>(function(){var sl=document.querySelectorAll('.slide'),ct=document.getElementById('ct'),de=document.getElementById('de'),total=sl.length,cur=0;sl.forEach(function(_,i){var b=document.createElement('button');b.className='dot'+(i===0?' active':'');b.style.background=i===0?'#e2b96f':'rgba(226,185,111,0.3)';b.setAttribute('aria-label','Slide '+(i+1));b.addEventListener('click',function(){go(i);});de.appendChild(b);});function go(n){sl[cur].classList.remove('active');de.children[cur].style.background='rgba(226,185,111,0.3)';de.children[cur].classList.remove('active');cur=((n%total)+total)%total;sl[cur].classList.add('active');de.children[cur].style.background='#e2b96f';de.children[cur].classList.add('active');ct.textContent=(cur+1)+' / '+total;}document.getElementById('bp').addEventListener('click',function(){go(cur-1);});document.getElementById('bn').addEventListener('click',function(){go(cur+1);});document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){e.preventDefault();go(cur+1);}if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();go(cur-1);}});var tx=null;document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});document.addEventListener('touchend',function(e){if(tx===null)return;var dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40)go(dx<0?cur+1:cur-1);tx=null;});}());</script></body></html>
