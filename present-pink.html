<!DOCTYPE html><html lang='en'><head>
<meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>My Library — Pink Script After Hours</title><style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{overflow:hidden;height:100vh;width:100vw}
.deck{position:relative;width:100vw;height:100vh}
.slide{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity 0.5s ease}
.slide.active{opacity:1;pointer-events:auto}
.dot{width:6px;height:6px;border-radius:50%;border:none;cursor:pointer;background:rgba(255,110,180,0.25);transition:background 0.3s,transform 0.25s}
.dot.on{background:#ff6eb4;transform:scale(1.5)}
.dots{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);
  display:flex;gap:0.5rem;z-index:200;
  background:rgba(0,0,0,0.2);padding:0.4rem 0.8rem;border-radius:2rem}
.btn-p,.btn-n{position:fixed;top:50%;transform:translateY(-50%);
  border:none;cursor:pointer;padding:0.8rem 0.5rem;z-index:200;
  background:rgba(0,0,0,0.18);color:rgba(255,255,255,0.5);border-radius:2px;
  transition:background 0.2s,color 0.2s}
.btn-p:hover,.btn-n:hover{background:rgba(0,0,0,0.5);color:#fff}
.btn-p{left:0.4rem}.btn-n{right:0.4rem}
#ct{position:fixed;top:1.2rem;right:1.6rem;font-size:0.65rem;letter-spacing:0.14em;
  z-index:200;background:rgba(0,0,0,0.28);color:rgba(255,255,255,0.6);
  padding:0.25rem 0.55rem;border-radius:0.2rem}

body{font-family:'Trebuchet MS','Segoe UI',sans-serif;background:#12061e}
.slide{display:flex;flex-direction:column;background:#12061e;padding:6vh 8vw;position:relative;overflow:hidden}
.slide::before{content:'';position:absolute;width:40vw;height:40vw;border-radius:50%;
  background:radial-gradient(circle,rgba(255,80,160,0.12) 0%,transparent 70%);top:-10vw;right:-10vw;pointer-events:none}
.slide::after{content:'';position:absolute;width:30vw;height:30vw;border-radius:50%;
  background:radial-gradient(circle,rgba(140,60,255,0.1) 0%,transparent 70%);bottom:-8vw;left:20vw;pointer-events:none}
.pk-label{font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:#ff6eb4;margin-bottom:0.8rem}
.pk-title{font-family:'Palatino Linotype',Palatino,'Book Antiqua',serif;font-weight:400;font-style:italic;
  color:#ffd6eb;font-size:clamp(2rem,5vw,4.2rem);line-height:1.05;max-width:16ch}
.pk-body{color:rgba(255,214,235,0.5);font-size:clamp(0.75rem,1.4vw,0.9rem);line-height:1.7}
.pk-num-outline{font-family:'Palatino Linotype',Palatino,'Book Antiqua',serif;
  font-weight:400;font-style:italic;font-size:clamp(7rem,18vw,15rem);color:transparent;line-height:0.85;
  -webkit-text-stroke:1px rgba(255,110,180,0.45);letter-spacing:-0.03em}
.pk-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,110,180,0.2);border-radius:6px;padding:1.4rem 1.6rem}
.pk-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2vw;max-width:860px;margin-top:2rem}
.pk-num-sm{font-family:'Palatino Linotype',Palatino,'Book Antiqua',serif;font-weight:400;font-style:italic;
  font-size:clamp(2rem,4.5vw,3.5rem);color:#ff6eb4;line-height:1}
.pk-stat-l{font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,214,235,0.38);margin-top:0.3rem}
.pk-bar-row{display:grid;grid-template-columns:9rem 1fr 2rem;gap:1rem;align-items:center;margin-bottom:0.75rem}
.pk-bar-lbl{font-size:0.75rem;text-align:right;color:rgba(255,214,235,0.48)}
.pk-track{height:2px;background:rgba(255,110,180,0.12);overflow:hidden}
.pk-fill{height:100%;background:linear-gradient(90deg,#ff6eb4,#c44dff)}
.pk-ct{font-size:0.7rem;color:#ff6eb4}

</style></head><body>
<span id='ct'>1 / 3</span>
<div class='deck'><div class="slide active" style="justify-content:center;flex-direction:row;align-items:center;gap:5vw"><div class="pk-num-outline">16</div><div style="position:relative;z-index:1"><div class="pk-label">My Library</div><div class="pk-title">Books that stayed<br>with me.</div><div class="pk-body" style="margin-top:1.2rem">UK · 8 genres · 2026</div></div></div><div class="slide" style="justify-content:center"><div class="pk-label">By the Numbers</div><div class="pk-title" style="font-size:clamp(1.4rem,3vw,2.6rem)">What lives here.</div><div class="pk-stat-grid"><div class="pk-card"><div class="pk-num-sm">16</div><div class="pk-stat-l">Books</div></div><div class="pk-card"><div class="pk-num-sm">4</div><div class="pk-stat-l">Countries</div></div><div class="pk-card"><div class="pk-num-sm">62%</div><div class="pk-stat-l">Female Authors</div></div><div class="pk-card"><div class="pk-num-sm">8</div><div class="pk-stat-l">Categories</div></div></div></div><div class="slide" style="justify-content:center"><div class="pk-label">Reading Profile</div><div class="pk-title" style="font-size:clamp(1.4rem,3vw,2.6rem)">The genres I love.</div><div style="max-width:600px;margin-top:1.5rem"><div class="pk-bar-row"><div class="pk-bar-lbl">Memoir</div><div class="pk-track"><div class="pk-fill" style="width:100%"></div></div><div class="pk-ct">6</div></div><div class="pk-bar-row"><div class="pk-bar-lbl">Self-Help</div><div class="pk-track"><div class="pk-fill" style="width:50%"></div></div><div class="pk-ct">3</div></div><div class="pk-bar-row"><div class="pk-bar-lbl">Travel Writing</div><div class="pk-track"><div class="pk-fill" style="width:33%"></div></div><div class="pk-ct">2</div></div><div class="pk-bar-row"><div class="pk-bar-lbl">Children's</div><div class="pk-track"><div class="pk-fill" style="width:17%"></div></div><div class="pk-ct">1</div></div><div class="pk-bar-row"><div class="pk-bar-lbl">游记散文</div><div class="pk-track"><div class="pk-fill" style="width:17%"></div></div><div class="pk-ct">1</div></div><div class="pk-bar-row"><div class="pk-bar-lbl">History</div><div class="pk-track"><div class="pk-fill" style="width:17%"></div></div><div class="pk-ct">1</div></div><div class="pk-bar-row"><div class="pk-bar-lbl">Psychology</div><div class="pk-track"><div class="pk-fill" style="width:17%"></div></div><div class="pk-ct">1</div></div></div></div></div>
<div class='dots' id='de'></div>
<button class='btn-p' id='bp'><svg width='22' height='22' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.6' stroke-linecap='round'><polyline points='15 18 9 12 15 6'/></svg></button>
<button class='btn-n' id='bn'><svg width='22' height='22' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.6' stroke-linecap='round'><polyline points='9 18 15 12 9 6'/></svg></button>
<script>(function(){
var sl=document.querySelectorAll('.slide'),de=document.getElementById('de'),
    ct=document.getElementById('ct'),total=sl.length,cur=0;
sl.forEach(function(_,i){
  var b=document.createElement('button');b.className='dot'+(i===0?' on':'');
  b.addEventListener('click',function(){go(i);});de.appendChild(b);
});
function go(n){sl[cur].classList.remove('active');de.children[cur].classList.remove('on');
  cur=((n%total)+total)%total;sl[cur].classList.add('active');de.children[cur].classList.add('on');
  if(ct)ct.textContent=(cur+1)+' / '+total;}
document.getElementById('bp').onclick=function(){go(cur-1);};
document.getElementById('bn').onclick=function(){go(cur+1);};
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(cur+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();go(cur-1);}});
var tx=null;
document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',function(e){if(tx===null)return;
  var dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40)go(dx<0?cur+1:cur-1);tx=null;});
}());</script></body></html>
