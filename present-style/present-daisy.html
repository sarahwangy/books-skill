<!DOCTYPE html><html lang='en'><head>
<meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>My Library — Daisy Days</title><style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{overflow:hidden;height:100vh;width:100vw}
.deck{position:relative;width:100vw;height:100vh}
.slide{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity 0.5s ease}
.slide.active{opacity:1;pointer-events:auto}
.dot{width:6px;height:6px;border-radius:50%;border:none;cursor:pointer;background:rgba(234,179,8,0.3);transition:background 0.3s,transform 0.25s}
.dot.on{background:#eab308;transform:scale(1.5)}
.dots{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);
  display:flex;gap:0.5rem;z-index:200;
  background:rgba(0,0,0,0.2);padding:0.4rem 0.8rem;border-radius:2rem}
.btn-p,.btn-n{position:fixed;top:50%;transform:translateY(-50%);
  border:none;cursor:pointer;padding:0.8rem 0.5rem;z-index:200;
  background:rgba(0,0,0,0.18);color:rgba(255,255,255,0.5);border-radius:2px;
  transition:background 0.2s,color 0.2s}
.btn-p:hover,.btn-n:hover{background:rgba(0,0,0,0.5);color:#fff}
.btn-p{left:0.4rem}.btn-n{right:0.4rem}
#ct{position:fixed;top:1.2rem;right:1.6rem;font-size:0.65rem;letter-spacing:0.14em;
  z-index:200;background:rgba(0,0,0,0.28);color:rgba(255,255,255,0.6);
  padding:0.25rem 0.55rem;border-radius:0.2rem}

body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:#fffbf0}
.slide{display:flex;flex-direction:column;background:#fffbf0;padding:6vh 8vw;position:relative}
.dd-pill{display:inline-block;background:#fde047;color:#713f12;
  font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;
  padding:0.3rem 1rem;border-radius:2rem;margin-bottom:1.2rem;font-weight:600}
.dd-title{font-family:'Georgia',serif;font-weight:400;color:#1a1a1a;
  font-size:clamp(2rem,5.5vw,4.5rem);line-height:1.05;letter-spacing:-0.02em}
.dd-num{font-size:clamp(7rem,18vw,15rem);font-weight:700;color:#fde047;
  line-height:0.85;letter-spacing:-0.05em;-webkit-text-stroke:2px #eab308}
.dd-body{color:#6b7280;font-size:clamp(0.8rem,1.5vw,0.95rem);line-height:1.65}
.dd-bubble{background:#fff;border:2px solid #fde047;border-radius:1.2rem;
  padding:1.4rem 1.6rem;box-shadow:3px 3px 0 #fde047;flex:1;min-width:8rem}
.dd-bubble-n{font-size:clamp(2rem,4.5vw,3.2rem);font-weight:700;color:#1a1a1a;line-height:1}
.dd-bubble-l{font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;color:#9ca3af;margin-top:0.2rem}
.dd-bar-row{display:flex;align-items:center;gap:1rem;margin-bottom:0.65rem}
.dd-bar-lbl{font-size:0.82rem;color:#374151;min-width:9rem;text-align:right}
.dd-track{flex:1;height:10px;background:#fef9c3;border-radius:999px;overflow:hidden}
.dd-fill{height:100%;background:#fde047;border-radius:999px}
.dd-ct{font-size:0.75rem;color:#ca8a04;font-weight:600;min-width:1.5rem}

</style></head><body>

<button class='btn-n' id='bn'><svg width='22' height='22' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.6' stroke-linecap='round'><polyline points='9 18 15 12 9 6'/></svg></button>
<script>(function(){
var sl=document.querySelectorAll('.slide'),de=document.getElementById('de'),
    ct=document.getElementById('ct'),total=sl.length,cur=0;
sl.forEach(function(_,i){
  var b=document.createElement('button');b.className='dot'+(i===0?' on':'');
  b.addEventListener('click',function(){go(i);});de.appendChild(b);
});
function go(n){sl[cur].classList.remove('active');de.children[cur].classList.remove('on');
  cur=((n%total)+total)%total;sl[cur].classList.add('active');de.children[cur].classList.add('on');
  if(ct)ct.textContent=(cur+1)+' / '+total;}
document.getElementById('bp').onclick=function(){go(cur-1);};
document.getElementById('bn').onclick=function(){go(cur+1);};
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(cur+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();go(cur-1);}});
var tx=null;
document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',function(e){if(tx===null)return;
  var dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40)go(dx<0?cur+1:cur-1);tx=null;});
}());</script></body></html>
