*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{overflow:hidden;height:100vh;width:100vw}
.deck{position:relative;width:100vw;height:100vh}
.slide{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity 0.5s ease}
.slide.active{opacity:1;pointer-events:auto}
.dot{width:6px;height:6px;border-radius:50%;border:none;cursor:pointer;background:rgba(200,180,164,0.35);transition:background 0.3s,transform 0.25s}
.dot.on{background:#c8b4a4;transform:scale(1.5)}
.dots{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);
  display:flex;gap:0.5rem;z-index:200;
  background:rgba(0,0,0,0.2);padding:0.4rem 0.8rem;border-radius:2rem}
.btn-p,.btn-n{position:fixed;top:50%;transform:translateY(-50%);
  border:none;cursor:pointer;padding:0.8rem 0.5rem;z-index:200;
  background:rgba(0,0,0,0.18);color:rgba(255,255,255,0.5);border-radius:2px;
  transition:background 0.2s,color 0.2s}
.btn-p:hover,.btn-n:hover{background:rgba(0,0,0,0.5);color:#fff}
.btn-p{left:0.4rem}.btn-n{right:0.4rem}
#ct{position:fixed;top:1.2rem;right:1.6rem;font-size:0.65rem;letter-spacing:0.14em;
  z-index:200;background:rgba(0,0,0,0.28);color:rgba(255,255,255,0.6);
  padding:0.25rem 0.55rem;border-radius:0.2rem}

<div class='dots' id='de'></div>
<button class='btn-p' id='bp'><svg width='22' height='22' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.6' stroke-linecap='round'><polyline points='15 18 9 12 15 6'/></svg></button>
<button class='btn-n' id='bn'><svg width='22' height='22' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.6' stroke-linecap='round'><polyline points='9 18 15 12 9 6'/></svg></button>
<script>(function(){
var sl=document.querySelectorAll('.slide'),de=document.getElementById('de'),
    ct=document.getElementById('ct'),total=sl.length,cur=0;
sl.forEach(function(_,i){
  var b=document.createElement('button');b.className='dot'+(i===0?' on':'');
  b.addEventListener('click',function(){go(i);});de.appendChild(b);
});
function go(n){sl[cur].classList.remove('active');de.children[cur].classList.remove('on');
  cur=((n%total)+total)%total;sl[cur].classList.add('active');de.children[cur].classList.add('on');
  if(ct)ct.textContent=(cur+1)+' / '+total;}
document.getElementById('bp').onclick=function(){go(cur-1);};
document.getElementById('bn').onclick=function(){go(cur+1);};
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(cur+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();go(cur-1);}});
var tx=null;
document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',function(e){if(tx===null)return;
  var dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>40)go(dx<0?cur+1:cur-1);tx=null;});
}());</script></body></html>
